services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: trips
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trips"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build: .
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/trips
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/data/uploads
