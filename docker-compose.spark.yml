services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.spark
    env_file:
      - .env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/trips
      SPARK_SUBMIT_COMMAND: spark-submit
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./data/uploads:/app/data/uploads
